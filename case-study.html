document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

s to the goods they need — a circular, resourceful alternative to throwing things away.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- problem / objective / solution -->\n  <section class=\"wrap\" style=\"padding-top:64px;padding-bottom:60px\">\n    <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:20px\">\n      <div style=\"border:1px solid var(--line);border-radius:16px;padding:30px\"><div style=\"font-family:var(--disp);font-style:italic;font-size:22px;color:var(--accent);margin-bottom:12px\">The problem<\u002Fdiv><p style=\"font-size:15.5px;line-height:1.65;margin:0;color:var(--muted)\">Many people own useful items they no longer need that end up as trash — while others simply can't afford to buy what they need.<\u002Fp><\u002Fdiv>\n      <div style=\"border:1px solid var(--line);border-radius:16px;padding:30px\"><div style=\"font-family:var(--disp);font-style:italic;font-size:22px;color:var(--accent);margin-bottom:12px\">The objective<\u002Fdiv><p style=\"font-size:15.5px;line-height:1.65;margin:0;color:var(--muted)\">Create a solution that is practical and convenient, and that fosters a collaborative, sustainable community for the long term.<\u002Fp><\u002Fdiv>\n      <div style=\"border:1px solid var(--line);border-radius:16px;padding:30px\"><div style=\"font-family:var(--disp);font-style:italic;font-size:22px;color:var(--accent);margin-bottom:12px\">The solution<\u002Fdiv><p style=\"font-size:15.5px;line-height:1.65;margin:0;color:var(--muted)\">A platform to exchange items people no longer need — reducing waste and promoting environmental sustainability.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- design thinking process -->\n  <section class=\"wrap\" style=\"padding-bottom:64px\">\n    <h2 style=\"font-family:var(--head);font-weight:700;font-size:clamp(28px,3.6vw,36px);letter-spacing:-.02em;margin:0 0 28px\">Design Thinking<\u002Fh2>\n    <div style=\"display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--line);border:1px solid var(--line);border-radius:14px;overflow:hidden\">\n      <div style=\"background:var(--bg);padding:24px 18px\"><div style=\"font-family:var(--disp);font-style:italic;font-size:20px;color:var(--accent);margin-bottom:10px\">01<\u002Fdiv><div style=\"font-family:var(--head);font-weight:600;font-size:15px\">Empathize<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:var(--bg);padding:24px 18px\"><div style=\"font-family:var(--disp);font-style:italic;font-size:20px;color:var(--accent);margin-bottom:10px\">02<\u002Fdiv><div style=\"font-family:var(--head);font-weight:600;font-size:15px\">Define<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:var(--bg);padding:24px 18px\"><div style=\"font-family:var(--disp);font-style:italic;font-size:20px;color:var(--accent);margin-bottom:10px\">03<\u002Fdiv><div style=\"font-family:var(--head);font-weight:600;font-size:15px\">Ideate<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:var(--bg);padding:24px 18px\"><div style=\"font-family:var(--disp);font-style:italic;font-size:20px;color:var(--accent);margin-bottom:10px\">04<\u002Fdiv><div style=\"font-family:var(--head);font-weight:600;font-size:15px\">Prototype<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:var(--bg);padding:24px 18px\"><div style=\"font-family:var(--disp);font-style:italic;font-size:20px;color:var(--accent);margin-bottom:10px\">05<\u002Fdiv><div style=\"font-family:var(--head);font-weight:600;font-size:15px\">Validate<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- research + benchmark -->\n  <section class=\"wrap\" style=\"padding-bottom:64px\">\n    <div class=\"eyebrow\" style=\"margin-bottom:18px\">Research<\u002Fdiv>\n    <p style=\"font-family:var(--head);font-weight:500;font-size:clamp(20px,2.4vw,26px);line-height:1.42;letter-spacing:-.01em;margin:0 0 30px;max-width:760px\">Desk research showed a fast-growing \"recommerce\" economy — people increasingly buying, selling and renting second-hand goods as part of a circular, responsible model of consumption.<\u002Fp>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:20px\">\n      <div style=\"border:1px solid var(--line);border-radius:16px;padding:30px\">\n        <div style=\"font-family:var(--head);font-weight:700;font-size:18px;margin-bottom:6px\">Benchmark · Dondo<\u002Fdiv>\n        <div style=\"font-family:var(--head);font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:#2e8b57;font-weight:600;margin:16px 0 8px\">Strengths<\u002Fdiv>\n        <p style=\"font-size:14.5px;line-height:1.6;margin:0;color:var(--muted)\">Easy-to-use interface, an active community, wide product variety, a reputation system that builds trust, and money-free bartering that supports sustainability through reuse.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"border:1px solid var(--line);border-radius:16px;padding:30px\">\n        <div style=\"font-family:var(--head);font-weight:700;font-size:18px;margin-bottom:6px\">&nbsp;<\u002Fdiv>\n        <div style=\"font-family:var(--head);font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--accent);font-weight:600;margin:16px 0 8px\">Weaknesses<\u002Fdiv>\n        <p style=\"font-size:14.5px;line-height:1.6;margin:0;color:var(--muted)\">Variable product quality, transaction-security risks, limited availability, broken sort filters, oversized cards that hurt scanning, heavy advertising, and a location limited to your own neighbourhood.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- MVP -->\n  <section class=\"wrap\" style=\"padding-bottom:64px\">\n    <h2 style=\"font-family:var(--head);font-weight:700;font-size:clamp(28px,3.6vw,36px);letter-spacing:-.02em;margin:0 0 22px\">MVP<\u002Fh2>\n    <div style=\"display:flex;flex-wrap:wrap;gap:10px\">\n      <span style=\"font-family:var(--head);font-size:14px;font-weight:500;padding:10px 18px;border:1px solid var(--line);border-radius:30px\">Sign up &amp; create user<\u002Fspan>\n      <span style=\"font-family:var(--head);font-size:14px;font-weight:500;padding:10px 18px;border:1px solid var(--line);border-radius:30px\">Personalize profile<\u002Fspan>\n      <span style=\"font-family:var(--head);font-size:14px;font-weight:500;padding:10px 18px;border:1px solid var(--line);border-radius:30px\">Search products<\u002Fspan>\n      <span style=\"font-family:var(--head);font-size:14px;font-weight:500;padding:10px 18px;border:1px solid var(--line);border-radius:30px\">Add products &amp; services<\u002Fspan>\n      <span style=\"font-family:var(--head);font-size:14px;font-weight:500;padding:10px 18px;border:1px solid var(--line);border-radius:30px\">Offer an item to trade<\u002Fspan>\n      <span style=\"font-family:var(--head);font-size:14px;font-weight:500;padding:10px 18px;border:1px solid var(--line);border-radius:30px\">Chat with the other party<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- persona -->\n  <section class=\"wrap\" style=\"padding-bottom:64px\">\n    <div class=\"eyebrow\" style=\"margin-bottom:22px\">User Persona<\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:.8fr 1.2fr;gap:36px;align-items:start\">\n      <div>\n        \n        <div style=\"font-family:var(--head);font-weight:700;font-size:22px;margin-top:16px\">Juan Soriano<\u002Fdiv>\n        <div style=\"font-size:14px;color:var(--muted)\">26 · Civil Engineering student<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <p style=\"font-size:16px;line-height:1.7;color:var(--muted);margin:0 0 24px\">Proactive and sociable, passionate about music, reading and Star Wars. After moving house, Juan no longer uses his guitar and wants to find someone who'll value it — swapping it for another instrument to explore, saving time and money in the process.<\u002Fp>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:20px\">\n          <div style=\"border-top:2px solid var(--accent);padding-top:14px\"><div style=\"font-family:var(--head);font-weight:600;font-size:15px;margin-bottom:8px\">Motivations<\u002Fdiv><p style=\"font-size:14px;line-height:1.6;margin:0;color:var(--muted)\">Furnish his home carrying as little as possible and save money; learn to play new instruments.<\u002Fp><\u002Fdiv>\n          <div style=\"border-top:2px solid var(--accent);padding-top:14px\"><div style=\"font-family:var(--head);font-weight:600;font-size:15px;margin-bottom:8px\">Frustrations<\u002Fdiv><p style=\"font-size:14px;line-height:1.6;margin:0;color:var(--muted)\">Limited budget to furnish or buy instruments; a small space and too many items to move.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- wireflow / key screens -->\n  \n\n  <!-- wireframe evolution -->\n  <section class=\"wrap\" style=\"padding-bottom:64px\">\n    <h2 style=\"font-family:var(--head);font-weight:700;font-size:clamp(28px,3.6vw,36px);letter-spacing:-.02em;margin:0 0 6px\">Wireflow &amp; key screens<\u002Fh2>\n    <p style=\"font-size:16px;line-height:1.7;color:var(--muted);max-width:640px;margin:0 0 28px\">From sign-up to a completed swap: browse products and services, publish a listing, make an offer, chat, and confirm the trade with a \"It's a match!\" moment.<\u002Fp>\n    <sc-if value=\"{{ hasFigma }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"width:100%;border-radius:16px;overflow:hidden;border:1px solid var(--line);background:#efe7db\"><iframe title=\"Figma prototype\" src=\"{{ figmaSrc }}\" style=\"width:100%;height:680px;border:0;display:block\" allowfullscreen=\"\" loading=\"lazy\"><\u002Fiframe><\u002Fdiv><\u002Fsc-if><sc-if value=\"{{ noFigma }}\" hint-placeholder-val=\"{{ true }}\"><div style=\"border:2px dashed var(--line);border-radius:16px;padding:clamp(36px,6vw,64px);text-align:center\"><div style=\"font-family:var(--head);font-weight:600;font-size:17px;color:var(--ink);margin-bottom:10px\">▸ Embed your Figma prototype<\u002Fdiv><p style=\"font-size:14.5px;line-height:1.65;margin:0 auto;max-width:460px;color:var(--muted)\">Open the <strong>Tweaks<\u002Fstrong> panel and paste your Figma <strong>prototype share link<\u002Fstrong> into “Figma prototype URL”. The interactive flow — with its connections and buttons — plays right here.<\u002Fp><\u002Fdiv><\u002Fsc-if>\n  <\u002Fsection><section class=\"wrap\" style=\"padding-bottom:64px\">\n    <h2 style=\"font-family:var(--head);font-weight:700;font-size:clamp(28px,3.6vw,36px);letter-spacing:-.02em;margin:0 0 8px\">From lo-fi to hi-fi<\u002Fh2>\n    <p style=\"font-size:16px;line-height:1.7;color:var(--muted);max-width:640px;margin:0 0 28px\">Key decisions made while evolving the wireframes:<\u002Fp>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px\">\n      <div style=\"background:color-mix(in srgb,var(--accent) 8%,var(--bg));border-radius:14px;padding:24px\"><div style=\"font-family:var(--head);font-weight:600;font-size:16px;margin-bottom:8px\">Removed the landing page<\u002Fdiv><p style=\"font-size:14.5px;line-height:1.6;margin:0;color:var(--muted)\">Dropped users straight into products/services with a clear top menu — fewer steps, faster access, less confusion about where they are.<\u002Fp><\u002Fdiv>\n      <div style=\"background:color-mix(in srgb,var(--accent) 8%,var(--bg));border-radius:14px;padding:24px\"><div style=\"font-family:var(--head);font-weight:600;font-size:16px;margin-bottom:8px\">More whitespace<\u002Fdiv><p style=\"font-size:14.5px;line-height:1.6;margin:0;color:var(--muted)\">Reduced on-screen elements to cut cognitive load, improve readability and make key calls-to-action stand out.<\u002Fp><\u002Fdiv>\n      <div style=\"background:color-mix(in srgb,var(--accent) 8%,var(--bg));border-radius:14px;padding:24px\"><div style=\"font-family:var(--head);font-weight:600;font-size:16px;margin-bottom:8px\">Vertical scroll over \"See all\"<\u002Fdiv><p style=\"font-size:14.5px;line-height:1.6;margin:0;color:var(--muted)\">Replaced the \"See all\" click with fluid vertical scrolling to explore content more directly.<\u002Fp><\u002Fdiv>\n      <div style=\"background:color-mix(in srgb,var(--accent) 8%,var(--bg));border-radius:14px;padding:24px\"><div style=\"font-family:var(--head);font-weight:600;font-size:16px;margin-bottom:8px\">Clearer messages &amp; match<\u002Fdiv><p style=\"font-size:14.5px;line-height:1.6;margin:0;color:var(--muted)\">Showed the offered item beside each chat and added \"Continue here to finish your transaction\" so next steps are obvious.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- usability testing -->\n  <section style=\"background:var(--ink);color:var(--bg)\">\n    <div class=\"wrap\" style=\"padding-top:60px;padding-bottom:60px\">\n      <div class=\"eyebrow\" style=\"color:var(--accent-soft);margin-bottom:16px\">Usability testing<\u002Fdiv>\n      <p style=\"font-family:var(--head);font-weight:500;font-size:clamp(20px,2.6vw,28px);line-height:1.4;letter-spacing:-.01em;margin:0 0 32px;max-width:820px\">We watched real people use the prototype to uncover usability issues and check they could complete the tasks — swapping a summer dress for a pair of trainers.<\u002Fp>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:20px\">\n        <div style=\"background:color-mix(in srgb,var(--bg) 8%,var(--ink));border:1px solid color-mix(in srgb,var(--bg) 18%,transparent);border-radius:16px;padding:28px\"><div style=\"font-family:var(--head);font-weight:700;font-size:16px;margin-bottom:12px;color:#7ed6a6\">What worked<\u002Fdiv><p style=\"font-size:14.5px;line-height:1.65;margin:0;color:color-mix(in srgb,var(--bg) 78%,transparent)\">Users found the steps intuitive and the interface clear. Publishing a product was especially easy to discover.<\u002Fp><\u002Fdiv>\n        <div style=\"background:color-mix(in srgb,var(--bg) 8%,var(--ink));border:1px solid color-mix(in srgb,var(--bg) 18%,transparent);border-radius:16px;padding:28px\"><div style=\"font-family:var(--head);font-weight:700;font-size:16px;margin-bottom:12px;color:var(--accent-soft)\">What didn't<\u002Fdiv><p style=\"font-size:14.5px;line-height:1.65;margin:0;color:color-mix(in srgb,var(--bg) 78%,transparent)\">One user hit friction with an extra step — selecting the profile photo before tapping the profile icon.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:44px;margin-top:28px;flex-wrap:wrap\">\n        <div><div style=\"font-family:var(--head);font-weight:700;font-size:15px\">Efficacy<\u002Fdiv><div style=\"font-size:14px;color:color-mix(in srgb,var(--bg) 70%,transparent);margin-top:4px\">How many users completed each task (1 / 0 points)<\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-family:var(--head);font-weight:700;font-size:15px\">Efficiency<\u002Fdiv><div style=\"font-size:14px;color:color-mix(in srgb,var(--bg) 70%,transparent);margin-top:4px\">How long each task took to complete<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- UI system -->\n  <section class=\"wrap\" style=\"padding-top:64px;padding-bottom:32px\">\n    <h2 style=\"font-family:var(--head);font-weight:700;font-size:clamp(28px,3.6vw,36px);letter-spacing:-.02em;margin:0 0 28px\">The UI system<\u002Fh2>\n\n    <!-- mood board -->\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:36px;align-items:start;margin-bottom:44px\">\n      <div>\n        <div class=\"eyebrow\" style=\"margin-bottom:16px\">Mood board<\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:12px\">\n          <div><div style=\"aspect-ratio:1/1;border-radius:12px;background:#5e3b9e\"><\u002Fdiv><div style=\"font-family:var(--head);font-weight:600;font-size:12px;margin-top:8px\">Purple<\u002Fdiv><div style=\"font-size:11px;color:var(--muted)\">Power, dignity<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"aspect-ratio:1/1;border-radius:12px;background:#f2a8ce\"><\u002Fdiv><div style=\"font-family:var(--head);font-weight:600;font-size:12px;margin-top:8px\">Pink<\u002Fdiv><div style=\"font-size:11px;color:var(--muted)\">Warmth, joy<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"aspect-ratio:1/1;border-radius:12px;background:#faf7fb;border:1px solid var(--line)\"><\u002Fdiv><div style=\"font-family:var(--head);font-weight:600;font-size:12px;margin-top:8px\">White<\u002Fdiv><div style=\"font-size:11px;color:var(--muted)\">Light, clean<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"aspect-ratio:1/1;border-radius:12px;background:#201a28\"><\u002Fdiv><div style=\"font-family:var(--head);font-weight:600;font-size:12px;margin-top:8px\">Black<\u002Fdiv><div style=\"font-size:11px;color:var(--muted)\">Sophistication<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div class=\"eyebrow\" style=\"margin-bottom:16px\">Typography · Roboto<\u002Fdiv>\n        <div style=\"font-family:'Roboto',sans-serif\">\n          <div style=\"font-size:32px;font-weight:700;line-height:1.1;letter-spacing:0\">Headline 32/40<\u002Fdiv>\n          <div style=\"font-size:22px;font-weight:400;line-height:1.3;margin-top:8px\">Title Large 22/28<\u002Fdiv>\n          <div style=\"font-size:16px;font-weight:500;line-height:1.4;margin-top:8px;letter-spacing:.15px\">Title Medium 16/24<\u002Fdiv>\n          <div style=\"font-size:16px;font-weight:400;line-height:1.5;margin-top:8px;color:var(--muted)\">Body Large 16/24 — the workhorse text style used across the app for descriptions and list content.<\u002Fdiv>\n          <div style=\"font-size:12px;font-weight:500;line-height:1.4;margin-top:8px;letter-spacing:.5px;text-transform:uppercase;color:var(--muted)\">Label Medium 12/16<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- components -->\n    \n    <div style=\"display:flex;flex-wrap:wrap;gap:16px;align-items:center\">\n      <span style=\"font-family:'Roboto',sans-serif;font-weight:500;font-size:15px;padding:14px 40px;border-radius:30px;background:#5e3b9e;color:#fff\">Sign Up<\u002Fspan>\n      <span style=\"font-family:'Roboto',sans-serif;font-weight:500;font-size:14px;padding:11px 26px;border-radius:24px;background:#f2a8ce;color:#201a28\">Make Offer<\u002Fspan>\n      <span style=\"font-family:'Roboto',sans-serif;font-weight:500;font-size:14px;padding:11px 26px;border-radius:24px;border:1.5px solid #5e3b9e;color:#5e3b9e\">Message<\u002Fspan>\n      <span style=\"font-family:'Roboto',sans-serif;font-size:14px;padding:12px 22px;border-radius:24px;background:#faf7fb;border:1px solid var(--line);color:var(--muted);min-width:220px\">🔍  Search product by name<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- image slots for the real UI kit / mood board captures -->\n  <section class=\"wrap\" style=\"padding-bottom:64px\">\n    <div style=\"display:grid;grid-template-columns:1.4fr 1fr;gap:20px;margin-top:12px\">\n      \n      \n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- footer -->\n  <footer style=\"background:var(--accent);color:var(--on-accent)\">\n    <div class=\"wrap\" style=\"padding-top:56px;padding-bottom:40px;text-align:center\">\n      <div style=\"font-family:var(--head);font-size:12px;letter-spacing:.16em;text-transform:uppercase;margin-bottom:16px;opacity:.85\">Thanks for reading<\u002Fdiv>\n      <a href=\"index.html\" style=\"font-family:var(--head);font-weight:700;font-size:clamp(26px,4vw,40px);letter-spacing:-.02em;text-decoration:none;color:var(--on-accent)\">← Back to the full portfolio<\u002Fa>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;figmaUrl&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;https://www.figma.com/proto/6amKNOzluGqLGVfllEroyR/Alta-flow?node-id=1-4&amp;p=f&amp;t=1g6KQ7j5Kpe4GWRL-1&amp;scaling=scale-down&amp;content-scaling=fixed&amp;page-id=0%3A1&amp;starting-point-node-id=1%3A4&quot;,&quot;section&quot;:&quot;Prototype&quot;,&quot;tsType&quot;:&quot;string&quot;}}\">class Component extends DCLogic {\n  renderVals() {\n    const url = String(this.props.figmaUrl || \"\").trim();\n    const has = /^https?:\\/\\/(www\\.|embed\\.)?figma\\.com\\//i.test(url);\n    let src = \"\";\n    if (has) {\n      src = /^https?:\\/\\/embed\\.figma\\.com\\//i.test(url)\n        ? url\n        : \"https://www.figma.com/embed?embed_host=share&url=\" + encodeURIComponent(url);\n    }\n    return { hasFigma: has, noFigma: !has, figmaSrc: src };\n  }\n}<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
